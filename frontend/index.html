<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TCP Congestion Control Visualizer</title>
    <script>
      // Resolve the theme before first paint to avoid a flash of the
      // wrong theme. Mirrors src/features/theme/theme.ts.
      ;(function () {
        try {
          var stored = window.localStorage.getItem('tcp-visualizer.theme')
          var theme =
            stored === 'dark' || stored === 'light'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark'
          document.documentElement.setAttribute('data-theme', theme)
        } catch (error) {
          /* stay on the dark default */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
