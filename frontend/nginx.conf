# Serves the built SPA and proxies the API on the same origin.
#
# Same-origin proxying is what lets the browser keep calling /api/*
# exactly as it does behind the Vite dev proxy: one code path in the
# client, and no CORS configuration on the service.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed asset filenames are immutable; the entry document is not.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # The trailing slash strips the /api prefix, mirroring the dev proxy
    # rewrite: /api/health reaches the service as /health.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Single workspace, no routes (§6) — but a refresh on any path must
    # still return the app rather than a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
