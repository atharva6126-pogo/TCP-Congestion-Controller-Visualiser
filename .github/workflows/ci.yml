name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push supersedes an in-flight run of the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install
        run: pip install -e '.[dev]'

      - name: Format check (black)
        run: black --check src tests

      - name: Type check (mypy --strict)
        run: mypy --strict src tests

      - name: Tests (pytest)
        run: pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Format check (prettier)
        run: npm run format:check

      - name: Lint (oxlint)
        run: npm run lint

      # `npm run build` is `tsc -b && vite build`: the type check and the
      # production bundle in one step, exactly as the image builds it.
      - name: Type check and production build
        run: npm run build

  images:
    name: Docker images
    runs-on: ubuntu-latest
    # Only worth building once the code they contain is known good.
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
